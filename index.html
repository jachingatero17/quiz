<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Evil - Trivia Quiz</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #8b0000;
            --shadow-color: rgba(255, 0, 0, 0.3);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-size: 2rem;
            text-shadow: 0 0 10px var(--shadow-color);
        }

        .subtitle {
            color: #8a8a8a;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quiz-wrapper {
            position: relative;
            background-color: #121214;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 0 25px var(--shadow-color);
            overflow: hidden;
        }

        /* Hace que el iframe sea responsivo y no se deforme */
        .quiz-wrapper iframe {
            width: 100%;
            display: block;
            border-radius: 4px;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Resident Evil</h1>
        <div class="subtitle">Demuestra tu conocimiento en el juego de supervivencia</div>

        <div class="quiz-wrapper">
            <!-- Tu iframe de Wordwall integrado -->
            <iframe src="https://wordwall.net/es/embed/f527ba46a837414c8315987949bc0e46?themeId=1&templateId=5&fontStackId=0" width="500" height="380" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="footer">
            PROYECTO DE TRIVIA - AMULETO DE SUPERVIVENCIA
        </div>
    </div>

</body>
</html>
